<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QRadar Rule Analyzer</title>
    <script type="module" crossorigin src="/assets/index-CK_cQm7V.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-Co9va6AJ.css">
    <style>
      #complexity-panel {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 9999;
        background: #0f172a;
        border-top: 2px solid #334155;
        padding: 0;
        max-height: 380px;
        display: flex;
        flex-direction: column;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      #complexity-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 20px;
        background: #1e293b;
        cursor: pointer;
        border-bottom: 1px solid #334155;
        user-select: none;
      }
      #complexity-header h3 {
        margin: 0;
        color: #f1f5f9;
        font-size: 14px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #complexity-toggle-btn {
        background: #334155;
        border: none;
        color: #94a3b8;
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
      }
      #complexity-body {
        overflow-y: auto;
        padding: 12px 20px;
      }
      #complexity-body table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        color: #e2e8f0;
      }
      #complexity-body th {
        text-align: left;
        padding: 8px 12px;
        background: #1e293b;
        color: #94a3b8;
        font-weight: 600;
        border-bottom: 1px solid #334155;
        white-space: nowrap;
      }
      #complexity-body td {
        padding: 8px 12px;
        border-bottom: 1px solid #1e293b;
        vertical-align: top;
      }
      #complexity-body tr:hover td {
        background: #1e293b;
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 9999px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
      }
      .badge-critical { background: #7f1d1d; color: #fca5a5; }
      .badge-high     { background: #7c2d12; color: #fdba74; }
      .badge-medium   { background: #713f12; color: #fde047; }
      .badge-low      { background: #14532d; color: #86efac; }
      .score-bar-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 120px;
      }
      .score-bar {
        flex: 1;
        height: 6px;
        background: #334155;
        border-radius: 3px;
        overflow: hidden;
      }
      .score-bar-fill {
        height: 100%;
        border-radius: 3px;
        transition: width 0.3s;
      }
      .score-val {
        font-weight: 700;
        font-size: 13px;
        min-width: 28px;
        text-align: right;
      }
      .issues-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .issues-list li {
        font-size: 11px;
        color: #94a3b8;
        padding: 1px 0;
      }
      .issues-list li::before {
        content: "• ";
        color: #475569;
      }
      #complexity-loading {
        color: #64748b;
        font-size: 13px;
        padding: 20px;
        text-align: center;
      }
      #complexity-badge-count {
        background: #ef4444;
        color: white;
        border-radius: 9999px;
        padding: 1px 7px;
        font-size: 11px;
        font-weight: 700;
      }
      body {
        padding-bottom: 44px;
      }
      body.panel-open {
        padding-bottom: 380px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <div id="complexity-panel">
      <div id="complexity-header" onclick="toggleComplexityPanel()">
        <h3>
          Yuksek Karmasiklik Analizi
          <span id="complexity-badge-count">...</span>
        </h3>
        <button id="complexity-toggle-btn">Goster ▲</button>
      </div>
      <div id="complexity-body" style="display:none;">
        <div id="complexity-loading">Yukleniyor...</div>
        <table id="complexity-table" style="display:none;">
          <thead>
            <tr>
              <th>Kural Adi</th>
              <th>Skor</th>
              <th>Sinif</th>
              <th>Tespit Edilen Sorunlar</th>
            </tr>
          </thead>
          <tbody id="complexity-tbody"></tbody>
        </table>
      </div>
    </div>

    <script>
      var panelOpen = false;

      function toggleComplexityPanel() {
        panelOpen = !panelOpen;
        var body = document.getElementById('complexity-body');
        var btn = document.getElementById('complexity-toggle-btn');
        var docBody = document.body;
        if (panelOpen) {
          body.style.display = 'block';
          btn.textContent = 'Gizle ▼';
          docBody.classList.add('panel-open');
        } else {
          body.style.display = 'none';
          btn.textContent = 'Goster ▲';
          docBody.classList.remove('panel-open');
        }
      }

      function getScoreColor(score) {
        if (score >= 60) return '#ef4444';
        if (score >= 40) return '#f97316';
        if (score >= 20) return '#eab308';
        return '#22c55e';
      }

      function getBadgeClass(cls) {
        var map = {
          'CRITICAL': 'badge-critical',
          'HIGH': 'badge-high',
          'MEDIUM': 'badge-medium',
          'LOW': 'badge-low'
        };
        return map[cls] || 'badge-low';
      }

      function loadComplexityData() {
        fetch('/api/rules/complexity')
          .then(function(r) { return r.json(); })
          .then(function(data) {
            var rules = data.rules || [];
            var badge = document.getElementById('complexity-badge-count');
            var loading = document.getElementById('complexity-loading');
            var table = document.getElementById('complexity-table');
            var tbody = document.getElementById('complexity-tbody');

            var highCount = rules.filter(function(r) {
              return r.classification === 'HIGH' || r.classification === 'CRITICAL';
            }).length;

            badge.textContent = highCount + ' yuksek';
            loading.style.display = 'none';
            table.style.display = 'table';

            tbody.innerHTML = '';
            rules.forEach(function(r) {
              var color = getScoreColor(r.score);
              var issueHtml = '';
              if (r.issues && r.issues.length > 0) {
                issueHtml = '<ul class="issues-list">' +
                  r.issues.map(function(i) {
                    return '<li>' + i + '</li>';
                  }).join('') +
                  '</ul>';
              } else {
                issueHtml = '<span style="color:#475569;font-size:11px;">Sorun yok</span>';
              }

              var tr = document.createElement('tr');
              tr.innerHTML =
                '<td style="max-width:260px;word-break:break-word;">' + r.name + '</td>' +
                '<td>' +
                  '<div class="score-bar-wrap">' +
                    '<div class="score-bar">' +
                      '<div class="score-bar-fill" style="width:' + r.score + '%;background:' + color + ';"></div>' +
                    '</div>' +
                    '<span class="score-val" style="color:' + color + ';">' + r.score + '</span>' +
                  '</div>' +
                '</td>' +
                '<td><span class="badge ' + getBadgeClass(r.classification) + '">' + r.classification + '</span></td>' +
                '<td>' + issueHtml + '</td>';
              tbody.appendChild(tr);
            });
          })
          .catch(function(e) {
            document.getElementById('complexity-loading').textContent = 'Veri yuklenemedi: ' + e.message;
          });
      }

      window.addEventListener('load', function() {
        loadComplexityData();
        setInterval(loadComplexityData, 60000);
      });
    </script>
  </body>
</html>
